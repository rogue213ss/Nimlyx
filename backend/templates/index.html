<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nimlyx | Analyze. Explore. Discover.</title>

   <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

 <header class="topbar">

    <div class="topbar-brand">
        <i class="fa-solid fa-gamepad"></i>
        <span>Nimlyx</span>
    </div>

    
    <div class="topbar-search">
        <input
            type="text"
            id="gameInput"
            placeholder="Search any Steam game..."
            autocomplete="off"
        >

        <button id="searchBtn" aria-label="Search">
            <i class="fa-solid fa-magnifying-glass"></i>
        </button>

        <div id="suggestions" class="suggestions-dropdown"></div>
    </div>

</header>

<main>

    <!-- Search Results (Hidden until user searches) -->
    <section id="gameSection" class="hidden"></section>

<!-- Homepage -->
<section id="homeContent">

    <section class="home-section">
        <h2 class="section-title">🔥 Top Sellers</h2>
        <div class="carousel-wrapper">
            <button class="scroll-btn scroll-left" id="scrollLeft">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <div id="topSellers" class="carousel-row"></div>
            <button class="scroll-btn scroll-right" id="scrollRight">
                <i class="fa-solid fa-chevron-right"></i>
            </button>
        </div>
    </section>

    <section class="home-section">
        <h2 class="section-title">💸 Specials</h2>
        <div id="specials" class="grid-row"></div>
    </section>

    <section class="home-section">
        <h2 class="section-title">🆕 New Releases</h2>
        <div id="newReleases" class="grid-row-compact"></div>
    </section>

</section>

    <!-- Analytics (Hidden until search) -->
    <section id="analyticsSection" class="hidden">
        <div class="stats-container"></div>

        <div class="chart-container">
            <canvas id="mainChart"></canvas>
        </div>
    </section>

</main>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>
</html>
