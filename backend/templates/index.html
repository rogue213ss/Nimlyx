<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nimlyx | Analyze. Explore. Discover.</title>

   <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">
            <i class="fa-solid fa-gamepad"></i>
            <h2>Nimlyx</h2>
        </div>

        <nav>

            <a href="#">
                <i class="fa-solid fa-house"></i>
                Dashboard
            </a>

            <a href="#">
                <i class="fa-solid fa-magnifying-glass"></i>
                Search
            </a>

            <a href="#">
                <i class="fa-solid fa-chart-line"></i>
                Analytics
            </a>

            <a href="#">
                <i class="fa-solid fa-file-export"></i>
                Export
            </a>

        </nav>

    </aside>

    <!-- Main Content -->

    <main>

        <!-- Hero -->

        <section class="hero">

            <h1>Nimlyx</h1>

            <p>Analyze. Explore. Discover.</p>

            <span>
                Search and visualize Steam games with interactive analytics.
            </span>

        </section>

        <!-- Search -->
<section class="search-section">
    <input
        type="text"
        id="gameInput"
        placeholder="Search for any Steam game..."
    >
    <button id="searchBtn">
        <i class="fa-solid fa-magnifying-glass"></i>
        Search
    </button>
</section>

<div id="suggestions" class="suggestions-dropdown"></div>

        <!-- Game Information -->

        <section id="gameSection">

            <!-- JavaScript will insert the game card here -->

        </section>

        <!-- Analytics -->

        <section id="analyticsSection">

            <!-- Statistics Cards -->

            <div class="stats-container">

                <!-- JS -->

            </div>

            <!-- Charts -->

            <div class="chart-container">

                <canvas id="mainChart"></canvas>

            </div>

        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>
</html>
