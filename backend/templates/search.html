<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nimlyx | Game Details</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/search.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/search_mobile.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<!-- ================= HEADER =================
     Same .home-header / .home-nav / .home-search markup as index.html
     (Home page), copied verbatim so the nav bar is pixel-identical.
     search.js's ids are all preserved: #gameInput #searchBtn
     #suggestions #regionPicker #regionTrigger #regionTriggerLabel
     #regionMenu. Two page-specific additions on top of the shared
     markup: the #searchBtn button (this page's search is JS-driven,
     not a submitting <form>, so search.js can own navigation) and
     the region picker (no equivalent on Home/Discover). -->
<header class="home-header">
    <div class="home-container home-header-inner">
        <a href="/" class="home-logo" aria-label="Nimlyx home">
            <svg width="24" height="24" viewBox="0 0 26 26" fill="none">
                <polyline points="3,20 9,12 14,16 23,5" stroke="#3b82f6" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                <circle cx="23" cy="5" r="2.4" fill="#3b82f6"/>
            </svg>
            Nimlyx
        </a>

        <input type="checkbox" id="homeNavToggle" class="home-nav-checkbox">
        <label for="homeNavToggle" class="home-nav-burger" aria-hidden="true">
            <span></span><span></span><span></span>
        </label>

        <div class="home-nav-panel">
            <nav class="home-nav" aria-label="Primary">
                <a href="/">Home</a>
                <a href="/discover">Discover</a>
                <a href="/deals">Deals</a>
                <a href="/top-rated">Top Rated</a>
                <a href="/about">About</a>
            </nav>

            <!-- Not wrapped in a <form> like Home's — this page already
                 has a working, JS-driven search (#searchBtn / search.js)
                 that doesn't submit/reload, so no <form> was introduced
                 here to avoid changing that behavior. -->
            <div class="home-search">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="gameInput" placeholder="Search games, genres, developers…" autocomplete="off" aria-label="Search games">
                <button id="searchBtn" aria-label="Search"><i class="fa-solid fa-magnifying-glass"></i></button>
                <div id="suggestions" class="suggestions-dropdown"></div>
            </div>

            <div class="region-picker" id="regionPicker">
                <button type="button" class="region-picker__trigger" id="regionTrigger" aria-haspopup="listbox" aria-expanded="false">
                    <i class="fa-solid fa-globe"></i>
                    <span id="regionTriggerLabel">Region</span>
                    <i class="fa-solid fa-chevron-down region-picker__chevron"></i>
                </button>
                <div class="region-picker__menu" id="regionMenu" role="listbox"></div>
            </div>

            <button type="button" class="home-btn-ghost">Sign In</button>
        </div>
    </div>
</header>

<!-- ================= HERO ================= -->
<!-- NOTE ON "poster": search.js only ever sets .src on ONE image
     (#heroBg) — there's no second, independently-sourced poster
     asset coming from the API. Rather than invent a duplicate image
     element that JS would never populate (which would just show
     broken/blank art), the hero uses the single heroBg image as a
     full-bleed cinematic banner — the same approach Epic Games' and
     PlayStation Store's game pages use. The title block below sits in
     a glass panel over it, which reads as the "poster card" region
     without requiring a second image source. -->
<section class="hero">
    <img class="hero__bg" id="heroBg" alt="">
    <div class="hero__scrim"></div>
    <div class="hero__vignette"></div>
    <div class="hero__content">
        <div class="hero__panel reveal">
            <div class="hero__kicker" id="heroKicker"></div>
            <h1 class="hero__title" id="heroTitle"></h1>
            <div class="hero__meta" id="heroMeta"></div>
            <div class="hero__ctas">
                <button class="btn btn--primary" id="watchTrailerBtn">
                    <i class="fa-solid fa-circle-play"></i> Watch Trailer
                </button>
                <a class="btn btn--secondary" id="steamLink" href="#" target="_blank" rel="noopener">
                    <i class="fa-solid fa-arrow-up-right-from-square"></i> View on Steam
                </a>
            </div>
        </div>
    </div>
</section>

<!-- ================= MAIN — single premium column, no sidebar ================= -->
<main class="page">

    <!-- ================= ABOUT ================= -->
    <section class="panel about-panel reveal">
        <div class="panel__head">
            <span class="panel__eyebrow">Overview</span>
            <h2 class="panel__title">About</h2>
            <span class="ai-tag"><i class="fa-solid fa-wand-magic-sparkles"></i> AI Summary</span>
        </div>
        <div class="about-copy" id="aboutText"></div>
    </section>

    <!-- ================= SCREENSHOTS ================= -->
    <!-- .featured-wrap is on THIS section itself, matching the original
         markup exactly: search.js does `document.querySelector(".featured-wrap").style.display = "none"`
         when a game has no screenshots, which needs to hide the whole
         section (heading included), not just the image/thumbs. -->
    <section class="panel shots-panel featured-wrap reveal">
        <div class="panel__head">
            <span class="panel__eyebrow">Media</span>
            <h2 class="panel__title">Screenshots</h2>
        </div>

        <div class="featured-shot">
            <img id="featuredImg" alt="Featured screenshot">
            <button class="featured-shot__expand" title="Fullscreen (coming soon)">
                <i class="fa-solid fa-expand"></i>
            </button>
        </div>
        <div class="thumb-strip-wrap">
            <button class="strip-nav strip-nav--prev" id="stripPrev" aria-label="Scroll left"><i class="fa-solid fa-chevron-left"></i></button>
            <div class="thumb-strip" id="thumbStrip"></div>
            <button class="strip-nav strip-nav--next" id="stripNext" aria-label="Scroll right"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
    </section>

    <!-- ================= QUICK STATS ================= -->
    <section class="panel stats-panel reveal">
        <div class="panel__head">
            <span class="panel__eyebrow">At a glance</span>
            <h2 class="panel__title">Quick Stats</h2>
        </div>

        <!-- Spotlight row: the three "headline" cards the brief calls
             out by name (Metascore / Developer / Publisher). These sit
             above the compact grid below, which is the full data dump
             search.js already renders into #statsRows (price, score,
             reviews, platforms, developer, publisher, release again,
             in smaller form) — kept exactly as-is since it's existing
             JS behavior, just restyled as supporting detail. -->
        <div class="stats-spotlight">
            <div class="score-card">
                <span class="score-card__label"><i class="fa-solid fa-wand-magic-sparkles"></i> Nimlyx Score</span>
                <div class="score-ring">
                    <svg viewBox="0 0 132 132">
                        <defs>
                            <linearGradient id="scoreGradient" x1="0" y1="0" x2="1" y2="1">
                                <stop offset="0%" stop-color="#60A5FA"/>
                                <stop offset="100%" stop-color="#8B7CF6"/>
                            </linearGradient>
                        </defs>
                        <circle class="track" cx="66" cy="66" r="56"></circle>
                        <circle class="progress" id="scoreProgress" cx="66" cy="66" r="56"></circle>
                    </svg>
                    <div class="score-ring__value">
                        <strong id="scoreValue">0</strong>
                        <span>/ 100</span>
                    </div>
                </div>
                <div class="score-verdict" id="scoreVerdict"></div>
                <div class="score-note" id="scoreNote"></div>
            </div>

            <div class="credit-block">
                <div class="credit-icon"><i class="fa-solid fa-code"></i></div>
                <div>
                    <div class="credit-label">Developer</div>
                    <div class="credit-value" id="devValue"></div>
                </div>
            </div>

            <div class="credit-block">
                <div class="credit-icon"><i class="fa-solid fa-building"></i></div>
                <div>
                    <div class="credit-label">Publisher</div>
                    <div class="credit-value" id="pubValue"></div>
                </div>
            </div>
        </div>

        <div class="stats-grid" id="statsRows"></div>
    </section>

    <!-- ================= TRAILER ================= -->
    <section class="panel trailer-panel reveal" id="trailerSection">
        <div class="panel__head">
            <span class="panel__eyebrow">Watch</span>
            <h2 class="panel__title">Trailer</h2>
        </div>
        <div class="trailer__frame" id="trailerFrame"></div>
    </section>

    <!-- ================= ADDITIONAL INFORMATION (genres) ================= -->
    <section class="panel genres-panel reveal">
        <div class="panel__head">
            <span class="panel__eyebrow">Additional information</span>
            <h2 class="panel__title">Genres</h2>
        </div>
        <div class="genre-list" id="genreList"></div>
    </section>

</main>

<script src="{{ url_for('static', filename='js/search.js') }}"></script>

</body>
</html>
