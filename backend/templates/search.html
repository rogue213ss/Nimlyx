<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nimlyx | Game Details</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/search.css') }}">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

    <!-- ================= HEADER ================= -->

    <header class="topbar">

        <a href="/" class="topbar-brand">
            <i class="fa-solid fa-gamepad"></i>
            <span>NIMLYX</span>
        </a>

        <div class="topbar-search">

            <input
                type="text"
                id="gameInput"
                placeholder="Search for a game...">

            <button id="searchBtn">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>

        </div>

    </header>

    <!-- ================= MAIN ================= -->

<main>

    <!-- HERO -->
    <section class="hero-section" id="heroSection"></section>

    <!-- TWO COLUMN LAYOUT -->
    <div class="details-layout">

        <!-- LEFT 70% -->
        <div class="details-left">
            <section class="media-section" id="mediaSection"></section>
            <section class="about-section" id="aboutSection"></section>
            <section class="tags-section" id="tagsSection"></section>
            <section class="requirements-section" id="requirementsSection"></section>
        </div>

        <!-- RIGHT 30% -->
        <div class="details-right">
            <section class="stats-section" id="statsSection"></section>
        </div>

    </div>
<section class="media-section" id="mediaSection"></section>
</main>

    <script src="{{ url_for('static', filename='js/search.js') }}"></script>

</body>
</html>
